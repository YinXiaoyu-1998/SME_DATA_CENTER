services:
  mysql:
    image: mysql:8.4
    container_name: enterprise-hub-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-enterprise_hub}
      MYSQL_USER: ${MYSQL_USER:-enterprise_hub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-enterprise_hub_local_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-enterprise_hub_local_root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
